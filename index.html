<!DOCTYPE html>
<html>
<head>
    <title>Elba Traffic Live</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #map { flex-grow: 1; }
        #timetable { height: 200px; background: #222; color: #0f0; overflow-y: auto; padding: 10px; font-family: monospace; border-top: 2px solid #444; }
        .header { background: #333; color: white; padding: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="header">
    <h1>Traffic Manager - Elba Real-Time</h1>
    <div id="clock">Simulatore Ore: 08:00</div>
</div>

<div id="map"></div>

<div id="timetable">
    <h3>--- TABELLONE PARTENZE/ARRIVI ---</h3>
    <div id="log">In attesa del prossimo traghetto...</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // 1. Inizializzazione Mappa su Portoferraio
    const map = L.map('map').setView([42.81, 10.31], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // 2. Dati Orari (Esempio)
    const traghetti = [
        { nave: "Moby Baby Two", ora: "08:15", da: "Piombino", a: "Portoferraio", auto: 150 },
        { nave: "Toremar Oglasa", ora: "09:00", da: "Piombino", a: "Portoferraio", auto: 200 },
        { nave: "Blu Navy Acciarello", ora: "09:30", da: "Piombino", a: "Portoferraio", auto: 180 }
    ];

    let oraSimulata = 8;
    let minutiSimulati = 0;

    // 3. Funzione Loop Temporale
    function aggiornaSimulazione() {
        minutiSimulati++;
        if(minutiSimulati >= 60) {
            minutiSimulati = 0;
            oraSimulata++;
        }

        const orarioStringa = `${oraSimulata.toString().padStart(2, '0')}:${minutiSimulati.toString().padStart(2, '0')}`;
        document.getElementById('clock').innerText = "Simulatore Ore: " + orarioStringa;

        // Controllo se un traghetto deve partire
        traghetti.forEach(t => {
            if(t.ora === orarioStringa) {
                document.getElementById('log').innerHTML += `<br>[${orarioStringa}] ARRIVO: ${t.nave} da ${t.da}. Scarico di ${t.auto} veicoli in corso...`;
                // Qui aggiungeremo il movimento sulla mappa!
            }
        });
    }

    setInterval(aggiornaSimulazione, 1000); // 1 secondo reale = 1 minuto nel gioco
</script>
</body>
</html>
