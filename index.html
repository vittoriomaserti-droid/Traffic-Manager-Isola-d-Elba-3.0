
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Traffic Manager - Elba Live</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; height: 100vh; background: #000; color: #0f0; }
        #header { background: #111; padding: 10px; border-bottom: 2px solid #333; display: flex; justify-content: space-between; align-items: center; }
        #map { flex-grow: 1; border: 1px solid #333; }
        #timetable { height: 250px; background: #050505; overflow-y: auto; padding: 15px; border-top: 2px solid #444; }
        .ship-entry { border-bottom: 1px solid #1a1a1a; padding: 5px 0; font-size: 0.9em; }
        .alert { color: #f00; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="header">
    <div>🚢 ELBA TRAFFIC SIMULATOR v3.5</div>
    <div id="clock" style="font-size: 1.5em; font-weight: bold;">00:00</div>
    <div id="status">SISTEMA ATTIVO</div>
</div>

<div id="map"></div>

<div id="timetable">
    <div style="color: #aaa; margin-bottom: 10px;">--- LOG EVENTI E PARTENZE REALI ---</div>
    <div id="log">Inizializzazione dati...</div>
</div>

<audio id="beepAudio">
    <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
</audio>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Inizializzazione Mappa
    const map = L.map('map').setView([42.85, 10.45], 11);
    L.tileLayer('https://{s}.tile.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    // Coordinate Porti
    const porti = {
        piombino: [42.924, 10.546],
        portoferraio: [42.812, 10.315]
    };

    // DATABASE TRAGHETTI (Dati reali forniti)
    const partenzePiombino = [
        { ora: "05:30", nave: "MOBY NIKI", comp: "Moby" },
        { ora: "06:30", nave: "MARMORICA", comp: "Toremar" },
        { ora: "07:45", nave: "ACCIARELLO", comp: "Blu Navy" },
        { ora: "08:00", nave: "GIRAGLIA", comp: "Moby" },
        { ora: "08:40", nave: "SCHIOPPARELLO JET", comp: "Toremar" },
        { ora: "08:45", nave: "AETHALIA", comp: "Toremar" },
        { ora: "09:30", nave: "MOBY NIKI", comp: "Moby" },
        { ora: "10:00", nave: "MARMORICA", comp: "Toremar" },
        { ora: "10:45", nave: "ACCIARELLO", comp: "Blu Navy" },
        { ora: "11:40", nave: "OGLASA", comp: "Toremar" }
    ];

    let oraSimulata = 5;
    let minutiSimulati = 0;
    const audio = document.getElementById('beepAudio');

    function checkTimetable(currentH, currentM) {
        const currentTimeString = `${currentH.toString().padStart(2, '0')}:${currentM.toString().padStart(2, '0')}`;
        
        // Calcolo ora tra 15 minuti per il BIP
        let alertM = currentM + 15;
        let alertH = currentH;
        if (alertM >= 60) { alertM -= 60; alertH++; }
        const alertTimeString = `${alertH.toString().padStart(2, '0')}:${alertM.toString().padStart(2, '0')}`;

        partenzePiombino.forEach(p => {
            // Logica BIP 15 min prima
            if (p.ora === alertTimeString) {
                suonaBip(p.nave, p.ora);
            }

            // Logica Partenza Effettiva
            if (p.ora === currentTimeString) {
                effettuaPartenza(p);
            }
        });
    }

    function suonaBip(nave, ora) {
        audio.play().catch(e => console.log("Audio bloccato dal browser"));
        const log = document.getElementById('log');
        log.innerHTML = `<div class="alert">[ALERT] Partenza ${nave} prevista tra 15 min (${ora})!</div>` + log.innerHTML;
    }

    function effettuaPartenza(p) {
        const log = document.getElementById('log');
        log.innerHTML = `<div class="ship-entry" style="color:white"> [PARTENZA] ${p.nave} sta lasciando Piombino per Portoferraio.</div>` + log.innerHTML;
        
        // Crea marker nave che si muove
        let naveIcon = L.marker(porti.piombino).addTo(map).bindTooltip(p.nave, {permanent: true}).openTooltip();
        
        // Animazione verso Portoferraio (semplificata)
        let progress = 0;
        let moveInterval = setInterval(() => {
            progress += 0.01;
            let lat = porti.piombino[0] + (porti.portoferraio[0] - porti.piombino[0]) * progress;
            let lng = porti.piombino[1] + (porti.portoferraio[1] - porti.piombino[1]) * progress;
            naveIcon.setLatLng([lat, lng]);

            if (progress >= 1) {
                clearInterval(moveInterval);
                log.innerHTML = `<div class="ship-entry"> [ARRIVO] ${p.nave} attraccata a Portoferraio.</div>` + log.innerHTML;
                setTimeout(() => map.removeLayer(naveIcon), 5000);
            }
        }, 500);
    }

    function loop() {
        minutiSimulati++;
        if (minutiSimulati >= 60) {
            minutiSimulati = 0;
            oraSimulata++;
        }
        if (oraSimulata >= 24) oraSimulata = 0;

        const clockStr = `${oraSimulata.toString().padStart(2, '0')}:${minutiSimulati.toString().padStart(2, '0')}`;
        document.getElementById('clock').innerText = clockStr;
        
        checkTimetable(oraSimulata, minutiSimulati);
    }

    // Frequenza: 1 secondo reale = 1 minuto di simulazione
    setInterval(loop, 1000);
</script>
</body>
</html>
